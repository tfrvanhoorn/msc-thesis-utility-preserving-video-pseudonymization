data:
  dataset_path: data/celeba
  cache_dir: .cache/exp01
  dataset_type: celeba
  options:
    images_subdir: img_align_celeba
    identity_file: identity_CelebA.txt
    max_per_identity:
    max_samples:

detector:
  release_name: buffalo_l
  name: buffalo_l
  score_threshold: 0.6
  det_size: [640, 640]
  max_faces: 5
  ctx_id: 0
  providers:
    - CUDAExecutionProvider
    - CPUExecutionProvider

embedding:
  method: semantic
  feature_selector:
    keep:
      - male
  release_name: antelopev2
  model_name: glintr100
  embedding_size: 512
  ctx_id: 0
  providers:
    - CUDAExecutionProvider
    - CPUExecutionProvider

quantization:
  num_prototypes: 64
  max_iters: 20
  tol: 0.0001
  random_seed: 123
  train_split: 0.0
  max_train_samples:

seed:
  secret_key: "REPLACE_WITH_SECURE_KEY"
  digest: sha256

sweeps: []
